version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DERMAVISION_DATABASE_URL: sqlite+aiosqlite:///./dermavision.db
      DERMAVISION_DATA_DIR: /app/data
      DERMAVISION_MODEL_DIR: /app/models/checkpoints
      DERMAVISION_MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./outputs:/app/outputs
    depends_on:
      - mlflow

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api

  mlflow:
    image: python:3.12-slim
    working_dir: /mlflow
    command: >
      sh -c "pip install mlflow && mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/artifacts
